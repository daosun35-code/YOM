name: YOM
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: 17.0
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    PRODUCT_NAME: YOM
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    GENERATE_INFOPLIST_FILE: YES
targets:
  YOM:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
      - Features
      - Shared
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yom.appshell
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: We use your location to deliver nearby memory reminders while you explore.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: We save generated memory cards to your photo library when you choose Save to Photos.
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: We use your location to show your position on the map.

  YOMUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - YOMUITests
    dependencies:
      - target: YOM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yom.appshell.uitests
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_MODULE_NAME: YOMUITests
        TEST_TARGET_NAME: YOM
        GENERATE_INFOPLIST_FILE: YES

schemes:
  YOM:
    build:
      targets:
        YOM: all
    test:
      targets:
        - YOMUITests
